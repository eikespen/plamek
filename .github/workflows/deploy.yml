name: Deploy to host

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Deploy via lftp (FTPS)
        env:
          FTP_SERVER:    ${{ secrets.FTP_SERVER }}
          FTP_USERNAME:  ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD:  ${{ secrets.FTP_PASSWORD }}
          FTP_THEME_PATH: ${{ secrets.FTP_THEME_PATH }}
        run: |
          lftp -c "
            set ftp:ssl-allow yes;
            set ftp:ssl-force true;
            set ftp:ssl-protect-data true;
            set ssl:verify-certificate no;
            set net:max-retries 2;
            set net:timeout 30;
            open -u \"$FTP_USERNAME\",\"$FTP_PASSWORD\" ftp://$FTP_SERVER;
            mirror --reverse --delete --verbose --parallel=4 \
              --exclude-glob .git \
              --exclude-glob .git/* \
              --exclude-glob .github \
              --exclude-glob .github/* \
              --exclude-glob docker-compose.yml \
              --exclude-glob README.md \
              --exclude-glob CLAUDE.md \
              --exclude-glob .DS_Store \
              --exclude-glob .ftp-deploy-sync-state.json \
              --exclude-glob .ftp-deploy-state-v2.json \
              ./ \"$FTP_THEME_PATH\";
          "
