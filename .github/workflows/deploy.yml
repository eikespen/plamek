name: Deploy to host

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy theme via SFTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          local-dir: ./
          server-dir: ${{ secrets.FTP_THEME_PATH }}
          # Bump this state-name whenever you need to force a full re-upload
          # (e.g. if the action skipped new files due to a stale sync state).
          state-name: .ftp-deploy-state-v2.json
          dangerous-clean-slate: false
          log-level: standard
          exclude: |
            **/.git*
            **/.git*/**
            **/docker-compose.yml
            **/README.md
            **/.github/**
            **/CLAUDE.md
            **/.ftp-deploy-sync-state.json
